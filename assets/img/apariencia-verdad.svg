<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 570" role="img" aria-labelledby="t d">
  <title id="t">Apariencia de verdad</title>
  <desc id="d">Una tarjeta brillante que dice respuesta segura, observada con una lupa que revela datos, patrones, omisiones y dudas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#eef0ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2336c7"/>
      <stop offset="1" stop-color="#6574ff"/>
    </linearGradient>
  </defs>
  <rect width="900" height="570" rx="34" fill="url(#bg)"/>
  <rect x="75" y="85" width="530" height="350" rx="34" fill="url(#card)"/>
  <text x="115" y="150" font-family="Arial" font-size="28" font-weight="700" fill="#cfd4ff">LA IA RESPONDE</text>
  <text x="115" y="230" font-family="Arial" font-size="48" font-weight="700" fill="white">“Esto es así.”</text>
  <rect x="115" y="285" width="330" height="16" rx="8" fill="#bfc6ff"/>
  <rect x="115" y="325" width="390" height="16" rx="8" fill="#bfc6ff"/>
  <rect x="115" y="365" width="250" height="16" rx="8" fill="#bfc6ff"/>
  <circle cx="625" cy="350" r="130" fill="white" stroke="#ff8a3d" stroke-width="18"/>
  <path d="m718 443 103 103" stroke="#1f2937" stroke-width="32" stroke-linecap="round"/>
  <g font-family="Arial" font-weight="700" fill="#14217f">
    <text x="565" y="295" font-size="25">DATOS</text>
    <text x="548" y="345" font-size="25">PATRONES</text>
    <text x="535" y="395" font-size="25">OMISIONES</text>
    <text x="586" y="445" font-size="25">DUDAS</text>
  </g>
</svg>
